<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 300px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            color: #fff;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        h1 {
            margin: 0 0 12px 0;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
        }

        .setting-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .setting-label {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .setting-label .title {
            font-weight: 600;
            font-size: 14px;
        }

        .setting-label .description {
            font-size: 12px;
            opacity: 0.8;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 28px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .toggle-switch.enabled {
            background: #4ade80;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }

        .toggle-switch.enabled::after {
            left: 24px;
        }

        .info-box {
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-size: 12px;
            line-height: 1.4;
            opacity: 0.9;
        }

        .info-box strong {
            display: block;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏱️ Chess Timer Sounds</h1>
        
        <div class="setting-group">
            <div class="setting-label">
                <div class="title">Sound Alerts</div>
                <div class="description">Enable/disable timer sounds</div>
            </div>
            <div id="soundToggle" class="toggle-switch"></div>
        </div>

        <div class="info-box">
            <strong>Sound Schedule:</strong>
            • Every 10s: Beep<br>
            • At 30s: Warning tone<br>
            • Last 10s: Ticking sound
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
